<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Navgrah Menu</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        .custom-scrollbar::-webkit-scrollbar {
            width: 5px;
        }

        .custom-scrollbar::-webkit-scrollbar-track {
            background: #f1f5f9;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #a5b4fc;
            border-radius: 10px;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: #818cf8;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-image: url('../ui/navgrah_screen.webp');
            background-size: 100% 100%;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
        }
    </style>
</head>

<body class="flex justify-center items-center min-h-screen">

    <!-- Back Button -->
    <a href="categories.html"
       class="fixed top-6 left-6 z-10 bg-white800/80 backdrop-blur-md text-white font-semibold py-2 px-4 rounded-xl shadow-md transform transition-all duration-200 ease-in-out hover:bg-indigo-500 hover:text-white active:scale-95">
        ← Back
    </a>

    <div id="menu-container" class="max-h-96 overflow-y-auto custom-scrollbar pr-5">
        <ul class="space-y-5"></ul>
    </div>

<script>

const planets = [

    { name: "Surya (सूर्य)", file: "surya" },
    { name: "Chandra (चंद्र)", file: "chandra" },
    { name: "Mangal (मंगल)", file: "mangal" },
    { name: "Budh (बुध)", file: "budh" },
    { name: "Guru (गुरु)", file: "guru" },
    { name: "Shukra (शुक्र)", file: "shukra" },
    { name: "Shani (शनि)", file: "shani" },
    { name: "Rahu (राहु)", file: "rahu" },
    { name: "Ketu (केतु)", file: "ketu" }

];

// Sort alphabetically by display name
planets.sort((a, b) => a.name.localeCompare(b.name));

const menuList = document.querySelector('#menu-container ul');

function createMenuItems() {

    planets.forEach(item => {

        const li = document.createElement('li');

        const a = document.createElement('a');

        a.textContent = item.name;

        // Opens pages from navgrah folder
        a.href = `navgrah/${item.file}.html`;

        a.className =
            "block w-full text-center py-4 px-5 bg-indigo-500 text-white font-semibold rounded-xl shadow-md transform transition-all duration-200 ease-in-out hover:bg-indigo-600 hover:shadow-lg active:scale-95";

        li.appendChild(a);

        menuList.appendChild(li);

    });

}

createMenuItems();

</script>

</body>
</html>
